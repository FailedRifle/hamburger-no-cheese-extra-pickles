<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <link href="./favicon.png" rel="icon" type="image/png">
  <link id="pwa-manifest" rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#000000">
  <title>cheddarOS installer</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }
  </style>
</head>
<body>
<script>
  const isInstallable = true;
  const isPWA = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
  let deferredPrompt = null;
  let promptAttempted = false;

  if (!isInstallable) {
    const manifest = document.getElementById('pwa-manifest');
    if (manifest) manifest.remove();
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
    });
  }

  async function runInjection() {
    const newWin = window.open('', '_blank', 'width=900,height=475,menubar=no,status=no,location=no');
    if (!newWin) return;
    newWin.document.open();
    newWin.document.write(`
      <!doctype html>
      <html>
      <head>
        <meta charset="utf-8">
        <title>67777</title>
        <style>
          html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
          }
        </style>
      </head>
      <body>
        <script>
          (async () => {
            let baseHref = 'https://cdn.jsdelivr.net/gh/failedrifle/hamburger@main/core/library/';
            let htmlContent = '';

            try {
              const apiRes = await fetch('https://api.github.com/repos/failedrifle/hamburger/commits/main', {
                cache: 'no-store'
              });
              const data = await apiRes.json();
              if (data.sha) {
                baseHref = 'https://cdn.jsdelivr.net/gh/failedrifle/hamburger@' + data.sha + '/core/library/';
              }
            } catch (e) {}

            try {
              const pageRes = await fetch(baseHref + 'index.html?t=' + Date.now(), {
                cache: 'no-store'
              });
              htmlContent = await pageRes.text();
              document.open();
              document.write('<base href="' + baseHref + '">' + htmlContent);
              document.close();
            } catch (e) {
              location.href = 'https://failedrifle.github.io/hamburger/core/library/index.html';
            }
          })();
        <\/script>
      </body>
      </html>
    `);
    newWin.document.close();

    window.open('', '_self');
    window.close();
  }

  async function tryInstallPrompt() {
    if (!isInstallable || isPWA || promptAttempted || !deferredPrompt) return;
    promptAttempted = true;

    try {
      await deferredPrompt.prompt();
      await deferredPrompt.userChoice;
    } catch (e) {
    } finally {
      deferredPrompt = null;
      removePromptListeners();
    }
  }

  function addPromptListeners() {
    window.addEventListener('click', tryInstallPrompt, { once: true });
    window.addEventListener('keydown', tryInstallPrompt, { once: true });
    window.addEventListener('touchstart', tryInstallPrompt, { once: true });
  }

  function removePromptListeners() {
    window.removeEventListener('click', tryInstallPrompt);
    window.removeEventListener('keydown', tryInstallPrompt);
    window.removeEventListener('touchstart', tryInstallPrompt);
  }

  if (isInstallable && !isPWA) {
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      addPromptListeners();
    });
  }

  if (isPWA) {
    runInjection();
  }

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./service-worker.js').catch(() => {});
    });
  }
</script>
</body>
</html>
