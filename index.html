<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <link href="//netdna.bootstrapcdn.com/bootstrap/3.1.0/css/bootstrap.min.css" rel="stylesheet">
  <link href="//fonts.googleapis.com/css?family=Roboto:400,100,700,900" rel="stylesheet" type="text/css">
  
  <link href="./blocked.png" rel="icon" type="image/png">
  <link rel="manifest" href="./manifest.json">
  
  <meta name="theme-color" content="#000000">
  <style>
    @supports (font: -apple-system-body) { html { font: -apple-system-body; } }
    html { height: 100%; overflow: hidden; }
    body { margin: 0; padding: 0; background-color: #3E3E3E; background: radial-gradient(ellipse at center, #707070 13%, #333333 100%); font-family: 'Roboto', sans-serif; height: 100vh; }
    .outer { display: table; position: absolute; height: 100%; width: 100%; }
    .middle { display: table-cell; vertical-align: middle; }
    .content {
      max-width: 32em; padding: 0 1.25em; margin: 1.875em auto;
      color: #c7c7c7; text-align: center; font-size: 1.72em; font-weight: 100;
      height: 22em; background-repeat: no-repeat; background-size: 32%;
      background-position: center center;
      background-image: url('./blocked.png');
    }
    .content h1 { color: #00AAD7; font-size: 2.5em; margin: 0; margin-bottom: -20px; }
    iframe { position: fixed; inset: 0; width: 100%; height: 100%; border: none; display: none; }
  </style>
</head>
<body>
  <div id="browser-block" style="display:none;">
    <div class="outer">
      <div class="middle" aria-label="RESTRICTED!" title="RESTRICTED!">
        <div class="content">
          <h1><strong>RESTRICTED!</strong></h1>
          <br />
          This website has been blocked by Cheddar Hobbs.
        </div>
      </div>
    </div>
  </div>
  <iframe id="app-frame"></iframe>
  <script>
    const isPWA = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
    if (isPWA) {
      document.title = 'created by mhauber';
      const frame = document.getElementById('app-frame');
      frame.style.display = 'block';

      // Helper: fetch HTML from a CDN base and inject it into the iframe
      function injectFromBase(baseHref) {
        return fetch(baseHref + 'index.html')
          .then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.text(); })
          .then(html => {
            const destDoc = frame.contentWindow.document;
            destDoc.open();
            destDoc.write(`<base href="${baseHref}">` + html);
            destDoc.close();
          });
      }

      // Try to get the exact latest commit SHA so jsDelivr skips its @latest cache.
      // Falls back through two safe options if anything goes wrong.
      fetch('https://api.github.com/repos/failedrifle/hamburger/commits/main')
        .then(r => { if (!r.ok) throw new Error(`GitHub API ${r.status}`); return r.json(); })
        .then(data => {
          const sha = data && data.sha;
          if (!sha) throw new Error('SHA missing from API response');
          console.log('Loading CheddarOS at commit:', sha);
          return injectFromBase(`https://cdn.jsdelivr.net/gh/failedrifle/hamburger@${sha}/core/library/`);
        })
        .catch(err => {
          // Fallback 1: jsDelivr @main (refreshes every ~12 min, better than @latest)
          console.warn('SHA fetch failed, trying @main:', err.message);
          return injectFromBase('https://cdn.jsdelivr.net/gh/failedrifle/hamburger@main/core/library/')
            .catch(err2 => {
              // Fallback 2: GitHub Pages
              console.warn('CDN inject failed, falling back to GitHub Pages:', err2.message);
              frame.src = 'https://failedrifle.github.io/hamburger/core/library/index.html';
            });
        });
    } else {
      document.title = 'RESTRICTED!';
      document.getElementById('browser-block').style.display = 'block';
    }
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./service-worker.js')
          .then(reg => console.log('SW registered:', reg.scope))
          .catch(err => console.error('SW failed:', err));
      });
    }
  </script>
</body>
</html>
