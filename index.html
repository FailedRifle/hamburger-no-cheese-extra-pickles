<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --dos-bg:     #000000;
            --dos-box:    #0000aa;
            --dos-white:  #ffffff;
            --dos-gray:   #aaaaaa;
            --dos-yellow: #ffff55;
            --dos-cyan:   #55ffff;
            --dos-red:    #ff5555;
            --dos-green:  #55ff55;
        }
        html, body { width: 100%; height: 100%; overflow: hidden; background: var(--dos-bg); }
        .dos-shell {
            position: fixed; inset: 0; background: var(--dos-bg);
            overflow-y: auto; overflow-x: hidden; padding: 6px 8px 8px 8px;
        }
        .dos-shell::-webkit-scrollbar { width: 0; }
        .dos-infobox {
            display: inline-block; border: 2px solid var(--dos-white);
            background: var(--dos-box); padding: 6px 14px 8px 10px;
            margin-bottom: 0; max-width: 620px;
        }
        .dos-infobox .log-line { color: var(--dos-white); }
        .dos-terminal { margin-top: 0; }
        .log-line, .prompt, input, #ghost-input {
            font-family: 'Lucida Console', 'Courier New', monospace;
            font-size: 15px; line-height: 1.35;
        }
        .log-line { color: var(--dos-gray); white-space: pre-wrap; word-break: break-all; }
        .input-row { display: flex; align-items: center; }
        .prompt { color: var(--dos-gray); white-space: nowrap; flex-shrink: 0; }
        .input-wrapper { position: relative; flex: 1; display: flex; align-items: center; }
        input {
            background: transparent; border: none; outline: none;
            color: var(--dos-gray); width: 100%; padding: 0; margin: 0;
            caret-color: var(--dos-gray); z-index: 2;
        }
        #ghost-input {
            position: absolute; top: 0; left: 0; color: #333333;
            pointer-events: none; white-space: pre; overflow: hidden; z-index: 1;
        }
        ::selection { background: var(--dos-white); color: var(--dos-bg); }
    </style>
</head>
<body onclick="document.getElementById('terminalInput').focus()">
<div class="dos-shell" id="dos-shell">
    <div class="dos-infobox">
        <div class="log-line" id="ver-line" style="color:var(--dos-white);font-weight:bold;">Welcome to CheddarOS</div>
        <div class="log-line">&nbsp;</div>
        <div class="log-line">For a list of all commands type <span style="color:var(--dos-yellow)">HELP</span></div>
        <div class="log-line">To see the most recent updates type <span style="color:var(--dos-yellow)">CHANGELOG</span></div>
        <div id="announcement-area"></div>
    </div>
    <div class="dos-terminal" id="history"></div>
    <div class="log-line">&nbsp;</div>
    <div class="input-row">
        <span class="prompt">C:\CheddarOS>&nbsp;</span>
        <div class="input-wrapper">
            <input type="text" id="terminalInput" autofocus spellcheck="false" autocomplete="off">
            <div id="ghost-input"></div>
        </div>
    </div>
</div>
<script>
    const OS_VERSION = "vBETA-1.0.0c";
    document.getElementById("ver-line").textContent = `Welcome to CheddarOS ${OS_VERSION}`;
    document.title = `CheddarOS ${OS_VERSION}`;

    let cmdRunCount = 0;
    let isLaunching = false;
    let cmdHistory  = [];
    let historyIdx  = -1;
    let githubLastUpdate  = "";
    let githubCommitCount = "";

    async function getFailedRifleStats() {
        try {
            const commitRes = await fetch('https://api.github.com/repos/FailedRifle/hamburger/commits/main');
            const commitData = await commitRes.json();
            const formatter = new Intl.DateTimeFormat('en-US', {
                year: 'numeric', month: '2-digit', day: '2-digit',
                hour: 'numeric', minute: '2-digit', hour12: true,
                timeZone: 'America/New_York', timeZoneName: 'short'
            });
            githubLastUpdate = formatter.format(new Date(commitData.commit.committer.date)).replace(',', '');
        } catch { githubLastUpdate = "Unavailable"; }
        try {
            const response = await fetch('https://api.github.com/repos/FailedRifle/hamburger/commits?sha=main&per_page=100');
            const commits = await response.json();
            githubCommitCount = Array.isArray(commits) ? commits.length : "Not found";
        } catch { githubCommitCount = "Unavailable"; }
    }
    getFailedRifleStats();

    const ANNOUNCEMENT_TEXT = "CheddarOS is forever FREE";
    (function() {
        const area = document.getElementById("announcement-area");
        if (!ANNOUNCEMENT_TEXT.trim()) { area.innerHTML = ""; return; }
        area.innerHTML = `
            <div class="log-line">&nbsp;</div>
            <div class="log-line" style="color:var(--dos-red)">[NOTICE] ${ANNOUNCEMENT_TEXT}</div>
        `;
    })();

    const gameDirectory = "https://cdn.jsdelivr.net/gh/FailedRifle/hamburger@main/games";
    const toolDirectory = "https://cdn.jsdelivr.net/gh/FailedRifle/hamburger@main/core/library/tools";

    const sites = {
        "fnae": { name: "Five Nights at Epstein's", enabled: true, src: "fnae"},
        "geometrydash": { name: "Geometry Dash Lite", enabled: true, src: "geometry-dash"},
        "minecraft": { name: "Minecraft v1.12.2", enabled: true, src: "minecraft"},
        "zombies": { name: "CoD Zombies", enabled: true, src: "nz-zombies"},
        "sm64": { name: "Super Mario 64", enabled: true, src: "sm64"},
        "potato": { name: "Throw a Potato", enabled: true, src: "throw-a-potato"},
        "snowrider": { name: "Snow Rider 3D", enabled: true, src: "snow-rider3d"},
        "retrobowl": { name: "Retro Bowl", enabled: true, src: "retro-bowl"},
        "wrestlebros": { name: "Wrestle Bros", enabled: false, src: "wrestle-bros"},
        "buckshot": { name: "Buckshot Roulette", enabled: true, src: "buckshot-roulette"},
        "drifthunters": { name: "Drift Hunters", enabled: true, src: "drift-hunters"},
        "basketball": { name: "Basketball Legends 2020", enabled: false, src: "basketball-legends"},
        "cheddarclicker": { name: "Cheddar Clicker", enabled: true, src: "cheddar-clicker"},
        "bloonstd4": { name: "Bloons Tower Defense 4", enabled: true, src: "bloons-td4"},
    };

    const tools = {
        "ide": { name: "CheddarOS IDE", enabled: true, src: "cheddar-ide" },
        "formcracker": { name: "Google Form Cracker", enabled: true, src: "form-cracker" },
        "gpt": { name: "CheddarGPT", enabled: true, src: "gpt" },
    };

    const commandDetails = {
        "changelog": "View recent system updates.",
        "clear":     "Clear the terminal screen.",
        "credits":   "View the authors and contributors.",
        "gamelist":  "List all available games.",
        "help":      "Display this help menu.",
        "info":      "View repository and build information.",
        "toollist":  "List all available system tools.",
    };

    const inputField  = document.getElementById("terminalInput");
    const ghostField  = document.getElementById("ghost-input");
    const historyArea = document.getElementById("history");
    const scrollEl    = document.getElementById("dos-shell");
    const allSugg     = [...Object.keys(commandDetails), ...Object.keys(sites)].sort();

    function smartScroll() { scrollEl.scrollTop = scrollEl.scrollHeight; }

    function ln(text, color) {
        const s = color ? ` style="color:${color}"` : '';
        return `<div class="log-line"${s}>${text}</div>`;
    }
    const blank = () => `<div class="log-line">&nbsp;</div>`;

    function changelog(...entries) {
        return entries.map(e => `<div class="log-line">${e.split('$').join('<br>')}</div>${blank()}`).join('');
    }

    async function fakeLoad(siteKey) {
        isLaunching = true;
        inputField.disabled = true;
        const sd = sites[siteKey];
        const ob = document.createElement("div");
        historyArea.appendChild(ob);

        if (!sd.enabled) {
            ob.innerHTML += ln(`'${sd.name}' is not currently available.`, 'var(--dos-red)');
            ob.innerHTML += ln(`This game has been taken offline because of an error.`, 'var(--dos-yellow)');
            ob.innerHTML += ln(`Please check back next update to see the status of the game.`, 'var(--dos-yellow)');
            isLaunching = false; inputField.disabled = false; inputField.focus(); smartScroll(); return;
        }

        ob.innerHTML += ln(`Fetching ${sd.name}...`);
        smartScroll();

        let gameHTML;
        try {
            const res = await fetch(`${gameDirectory}/${sd.src}/index.html`);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            gameHTML = await res.text();
        } catch (err) {
            ob.innerHTML += ln(`Failed to load '${sd.name}': ${err.message}`, 'var(--dos-red)');
            isLaunching = false; inputField.disabled = false; inputField.focus(); smartScroll(); return;
        }

        ob.innerHTML += ln(`Launching ${sd.name}...`);
        smartScroll();

        const blob    = new Blob([gameHTML], { type: 'text/html' });
        const blobURL = URL.createObjectURL(blob);

        const frame = document.createElement('iframe');
        frame.style.cssText = 'position:fixed;inset:0;width:100%;height:100%;border:none;z-index:9999;';
        frame.src = blobURL;
        document.body.appendChild(frame);

        const closeBtn = document.createElement('div');
        closeBtn.innerText = '✕';
        closeBtn.style.cssText = `
            position:fixed;
            top:10px;
            right:10px;
            z-index:10000;
            background:#960019;
            color:#ffffff;
            font-family:'Lucida Console','Courier New',monospace;
            font-size:11px;
            font-weight:bold;
            padding:5px 10px;
            cursor:pointer;
            border:2px solid #ffffff;
            box-shadow:2px 2px 0px #000000;
            user-select:none;
            opacity:1;
            transition:opacity 1.5s;
        `;
        closeBtn.onmouseenter = () => closeBtn.style.opacity = '1';
        closeBtn.onmouseleave = () => closeBtn.style.opacity = '0.15';
        setTimeout(() => { closeBtn.style.opacity = '0.15'; }, 2000);
        closeBtn.onclick = () => {
            frame.remove();
            closeBtn.remove();
            URL.revokeObjectURL(blobURL);
        };
        document.body.appendChild(closeBtn);

        ob.innerHTML += ln(`${sd.name} launched successfully.`, 'var(--dos-green)');
        isLaunching = false; inputField.disabled = false; inputField.focus(); smartScroll();
    }

    async function launchTool(toolKey) {
    isLaunching = true;
    inputField.disabled = true;
    const td = tools[toolKey];
    const ob = document.createElement("div");
    historyArea.appendChild(ob);

    if (!td.enabled) {
        ob.innerHTML += ln(`'${td.name}' is currently disabled.`, 'var(--dos-red)');
        isLaunching = false; inputField.disabled = false; inputField.focus(); return;
    }

    ob.innerHTML += ln(`Initializing ${td.name}...`);
    smartScroll();

    try {
        const res = await fetch(`${toolDirectory}/${td.src}/index.html`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const toolHTML = await res.text();

        const blob = new Blob([toolHTML], { type: 'text/html' });
        const blobURL = URL.createObjectURL(blob);
        
        // Using an iframe just like your games
        const frame = document.createElement('iframe');
        frame.style.cssText = 'position:fixed;inset:0;width:100%;height:100%;border:none;z-index:9999;';
        frame.src = blobURL;
        document.body.appendChild(frame);

        // UI for the close button
        const closeBtn = document.createElement('div');
        closeBtn.innerText = 'EXIT TOOL';
        closeBtn.style.cssText = `position:fixed;top:10px;right:10px;z-index:10000;background:#0000aa;color:#fff;font-family:monospace;padding:5px 10px;cursor:pointer;border:2px solid #fff;`;
        closeBtn.onclick = () => { frame.remove(); closeBtn.remove(); URL.revokeObjectURL(blobURL); };
        document.body.appendChild(closeBtn);

        ob.innerHTML += ln(`${td.name} started.`, 'var(--dos-green)');
    } catch (err) {
        ob.innerHTML += ln(`Error loading tool: ${err.message}`, 'var(--dos-red)');
    }

    isLaunching = false; inputField.disabled = false; inputField.focus(); smartScroll();
}

    inputField.addEventListener('input', () => {
        const val = inputField.value.toLowerCase();
        if (!val) { ghostField.innerText = ""; return; }
        const m = allSugg.find(s => s.startsWith(val));
        ghostField.innerText = m ? val + m.slice(val.length) : "";
    });

    inputField.addEventListener('keydown', e => {
        if (isLaunching) return;
        if (e.key === 'ArrowUp') {
            e.preventDefault();
            if (cmdHistory.length > 0 && historyIdx < cmdHistory.length - 1) {
                historyIdx++;
                inputField.value = cmdHistory[cmdHistory.length - 1 - historyIdx];
            }
        } else if (e.key === 'ArrowDown') {
            e.preventDefault();
            if (historyIdx > 0) { historyIdx--; inputField.value = cmdHistory[cmdHistory.length - 1 - historyIdx]; }
            else { historyIdx = -1; inputField.value = ""; }
        } else if (e.key === 'Tab') {
            e.preventDefault();
            if (ghostField.innerText) { inputField.value = ghostField.innerText; ghostField.innerText = ""; }
        } else if (e.key === 'Enter') {
            ghostField.innerText = ""; handleInput();
        }
    });

    function handleInput() {
        const rawInput = inputField.value.trim();
        if (rawInput === "") return;
        cmdHistory.push(rawInput);
        historyIdx = -1;
        const userInput = rawInput.toLowerCase();
        cmdRunCount++;

        historyArea.innerHTML += ln(`C:\\CheddarOS&gt; ${rawInput}`);
        const ob = document.createElement("div");
        historyArea.appendChild(ob);

        if (userInput === "help") {
            ob.innerHTML += blank();
            let lastLetter = "";
            Object.keys(commandDetails).sort().forEach(cmd => {
                const cur = cmd[0].toLowerCase();
                if (lastLetter !== "" && cur !== lastLetter) ob.innerHTML += blank();
                lastLetter = cur;
                ob.innerHTML += `<div class="log-line" style="display:grid;grid-template-columns:160px 1fr;line-height:1.35;">
                    <span style="color:var(--dos-yellow)">${cmd}</span>
                    <span>${commandDetails[cmd]}</span>
                </div>`;
            });
            ob.innerHTML += blank();
        }
        else if (userInput === "clear") {
            historyArea.innerHTML = ""; ob.remove();
        }
        else if (userInput === "info") {
            ob.innerHTML += blank();
            ob.innerHTML += ln("CheddarOS System Information", 'var(--dos-yellow)');
            ob.innerHTML += `<div class="log-line" style="display:grid;grid-template-columns:160px 1fr;line-height:1.35;"><span>System-Version</span><span>${OS_VERSION}</span></div>`;
            ob.innerHTML += `<div class="log-line" style="display:grid;grid-template-columns:160px 1fr;line-height:1.35;"><span>Version</span><span>${githubCommitCount}</span></div>`;
            ob.innerHTML += `<div class="log-line" style="display:grid;grid-template-columns:160px 1fr;line-height:1.35;"><span>Last Updated</span><span>${githubLastUpdate}</span></div>`;
            ob.innerHTML += `<div class="log-line" style="display:grid;grid-template-columns:160px 1fr;line-height:1.35;"><span>Blocked Counter</span><span>1</span></div>`;
            ob.innerHTML += blank();
        }

else if (userInput === "toollist") {
    ob.innerHTML += blank();
    Object.keys(tools).sort().forEach(key => {
        const col   = tools[key].enabled ? 'var(--dos-gray)' : 'var(--dos-red)';
        const badge = tools[key].enabled ? '' : ' <span style="color:var(--dos-red)">[OFFLINE]</span>';
        ob.innerHTML += `<div class="log-line" style="display:grid;grid-template-columns:160px 1fr;color:${col};line-height:1.35;">
            <span style="color:var(--dos-cyan)">${key}</span>
            <span>(${tools[key].name})${badge}</span>
        </div>`;
    });
    ob.innerHTML += blank();
}

else if (tools[userInput]) {
    ob.remove();
    launchTool(userInput); // New function created below
}
        else if (userInput === "credits") {
            ob.innerHTML += blank() + changelog(
                "--- CREDITS ---$CheddarOS " + OS_VERSION,
                "LEAD PROGRAMMER$- Matt Hauber (Cheddar Hobbs)",
                "CONTRIBUTORS$- Matt Marakovits$- Joey Lombardo (Joronster)$- Alex Falana",
                "TESTERS$- Jadell Vargas (Jelly)$- Vinny Nucci (Vinchenzo)$- Max Dankies$- Tyler Hartman",
                "DISCLAIMER$All Testers and Contributors are not affiliated in any way with the development of CheddarOS.",
            );
        }
        else if (userInput === "changelog") {
            ob.innerHTML += blank() + changelog(
                "--- CHANGELOG ---",
                "3/99/2026$vBETA-1.0.0a$- Finally out of alpha and into open beta$- Revamped UI again to be more unique$- Console, games, and the password are now under 1 tab$- Welcoming new testers to CheddarOS",
                "3/14/2026$vALPHA-2.1.3$- Fixed Bloons TD4",
                "3/13/2026$vALPHA-2.1.2$- Added Bloons TD4$- Fixed formatting$- Minor bug fixes",
                "3/11/2026$vALPHA-2.1.1$- Added Basketball Legends$- Basketball Legends offline while looking for GoGuardian bypass",
                "3/9/2026$vALPHA-2.1.0$- Completely changed how games load$- Games load faster than ever$- Reduced lag in every game and inside CheddarOS$- Fixed GoGuardian bypass for Buckshot Roulette$- Shell Shockers removed",
                "3/8/2026$vALPHA-2.0.3$- Added Drift Hunters",
                "3/7/2026$vALPHA-2.0.2$- Added a info command to see more information about CheddarOS",
                "3/7/2026$vALPHA-2.0.1$- Formatted the games and the help list to look more professional$- Added an announcement text$- Minor bug fixes",
                "3/4/2026$vALPHA-2.0.0$- Completely revamped the UI$- Changed tab name and icon",
                "2/27/2026$vALPHA-1.1.0$- Massive Code Cleanup",
                "2/27/2026$vALPHA-1.0.10$- Added Buckshot Roulette",
                "2/27/2026$vALPHA-1.0.9$- Added Wrestle Bros",
                "2/27/2026$vALPHA-1.0.8$- Formatted the credits screen",
                "2/26/2026$vALPHA-1.0.7$- Added Shell Shockers",
                "2/26/2026$vALPHA-1.0.6$- Added Retro Bowl",
                "2/26/2026$vALPHA-1.0.5b$- Minor bug fixes$- Cut the loading speed in half.",
                "2/25/2026$vALPHA-1.0.5$- Throw a Potato fixed$- Removed ads$- FNaE revamp$- Fixed Snow Rider 3D black screen",
                "2/25/2026$vALPHA-1.0.4$- FNaE back online",
                "2/25/2026$vALPHA-1.0.3$- FNaE taken offline$- Throw a Potato offline (GoGuardian)",
                "2/23/2026$vALPHA-1.0.2$- Minor fixes$- Throw a Potato playable$- Added Snow Rider 3D (WIP)",
                "2/23/2026$vALPHA-1.0.1$- Throw a Potato maintenance",
                "2/23/2026$vALPHA-1.0.0$- CheddarOS early private access release."
            );
        }
        else if (userInput === "gamelist") {
            ob.innerHTML += blank();
            const groups = {};
            Object.keys(sites).sort().forEach(key => {
                const fc = key[0].toLowerCase();
                if (!groups[fc]) groups[fc] = [];
                groups[fc].push(key);
            });
            Object.keys(groups).sort().forEach((letter, i) => {
                if (i > 0) ob.innerHTML += blank();
                groups[letter].sort((a, b) => {
                    if (sites[a].enabled === sites[b].enabled) return a.localeCompare(b);
                    return sites[a].enabled ? -1 : 1;
                }).forEach(key => {
                    const col   = sites[key].enabled ? 'var(--dos-gray)' : 'var(--dos-red)';
                    const badge = sites[key].enabled ? '' : ' <span style="color:var(--dos-red)">[OFFLINE]</span>';
                    ob.innerHTML += `<div class="log-line" style="display:grid;grid-template-columns:160px 1fr;color:${col};line-height:1.35;">
                        <span style="color:var(--dos-yellow)">${key}</span>
                        <span>(${sites[key].name})${badge}</span>
                    </div>`;
                });
            });
            ob.innerHTML += blank();
        }
        else if (sites[userInput]) {
            ob.remove(); fakeLoad(userInput);
        }
        else {
            ob.innerHTML += ln(`'${rawInput}' is not recognized as an internal or external command,`);
            ob.innerHTML += ln(`operable program or batch file.`);
            ob.innerHTML += blank();
        }

        inputField.value = "";
        smartScroll();
    }
</script>
</body>
</html>
